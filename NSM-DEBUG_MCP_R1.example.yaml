serial:
  port:
  baud_rate: 9600
  bytesize: 8
  parity: N
  stopbits: 1
  timeout: 1.0
  read_timeout: 1.0
  xonxoff: true
  rtscts: false
  dsrdtr: false
  inter_byte_timeout: 0.1

session:
  hostname: R1
  username: admin
  password: "CHANGE_ME_PASSWORD"
  enable_password: "CHANGE_ME_PASSWORD"
  username_prompt: "Username:"
  password_prompt: "Password:"
  enable_command: "enable"
  user_prompt_suffix: ">"
  privileged_prompt_suffix: "#"
  line_ending: "\r\n"
  command_timeout: 15.0
  login_timeout: 20.0
  paging_disable_command: "terminal length 0"

commands:
  run_cli:
    command: "{command}"
    need_parse: true
    prompts:
      - "在 R1 上执行命令 {command}"
      - "在 R1 上执行 show ip interface brief"
      - "在 R1 上执行 show running-config"

  show_version:
    command: "show version"
    need_parse: true
    prompts:
      - "查看 R1 的版本信息"

  show_ip_interface_brief:
    command: "show ip interface brief"
    need_parse: true
    prompts:
      - "查看 R1 接口摘要"

  show_running_config:
    command: "show running-config"
    need_parse: true
    prompts:
      - "查看 R1 当前配置"